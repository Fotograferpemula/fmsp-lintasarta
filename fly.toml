# fly.toml — FMSP Lintasarta Facility Management System
# Generated for Fly.io deployment

app = "fmsp-lintasarta"
primary_region = "sin"  # Singapore — closest to Indonesia

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.alive]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    path = "/"
    port = 8080
    timeout = "10s"
    type = "http"
