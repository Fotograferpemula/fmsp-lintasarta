<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Lintasarta Logo - Blue Ribbon Brand Color #1769FF -->
  <defs>
    <linearGradient id="lintasarta-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1769FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D4FCC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon Mark - Abstract "L" shape -->
  <rect x="2" y="4" width="8" height="40" rx="4" fill="url(#lintasarta-grad)"/>
  <rect x="2" y="36" width="24" height="8" rx="4" fill="url(#lintasarta-grad)"/>
  <circle cx="22" cy="8" r="5" fill="#1769FF" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="34" y="34" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="26" fill="currentColor" letter-spacing="-0.5">lintasarta</text>
</svg>
