# ════════════════════════════════════════════════════════
# FMSP Lintasarta — Docker Compose PRODUCTION Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ════════════════════════════════════════════════════════

services:
  postgres:
    # Jangan expose port PostgreSQL ke host di production
    ports: []
    environment:
      # Tuning untuk production workload
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c" 
      - "max_connections=150"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "log_min_duration_statement=1000"

  app:
    restart: unless-stopped
    environment:
      NODE_ENV: production

  # Backup otomatis harian dengan rotasi 7 hari
  backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-fmsp_db}
      POSTGRES_USER: ${POSTGRES_USER:-fmsp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD wajib di-set}
      SCHEDULE: "@daily"
      BACKUP_NUM_KEEP: 7
      BACKUP_DIR: /backups
    volumes:
      - ./backups:/backups
